name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/lorescryver
            if [ ! -d .git ]; then
              git clone https://github.com/kodigero/lorescryver.git .
            else
              git pull origin main
            fi
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # Inject secrets into .env
            grep -q '^DEEPSEEK_API_KEY=' .env && sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}|" .env || echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
            grep -q '^DB_PASSWORD=' .env && sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.DB_PASSWORD }}|" .env || echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            grep -q '^AUTH_SECRET=' .env && sed -i "s|^AUTH_SECRET=.*|AUTH_SECRET=${{ secrets.AUTH_SECRET }}|" .env || echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env

            # Stop any old containers from previous compose setups
            docker compose down 2>/dev/null || true

            # Build fresh (no cache) and recreate containers
            docker compose -f deploy/docker-compose.prod.yml --env-file .env build --no-cache app
            docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d --force-recreate

            # Clean up old dangling images
            docker image prune -f

            echo "Deployed successfully!"
