name: Deploy to Hetzner

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/lorescryver
            if [ ! -d .git ]; then
              git clone https://github.com/kodigero/lorescryver.git .
            else
              git pull origin main
            fi
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # Safely create secrets file instead of using sed
            cat << 'EOF' > .env.secrets
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            EOF
            chmod 600 .env.secrets

            # Build app and migration containers
            docker compose -f deploy/docker-compose.prod.yml --env-file .env --env-file .env.secrets build app migration

            # Run migrations using the builder image before updating the app container
            docker compose -f deploy/docker-compose.prod.yml --env-file .env --env-file .env.secrets run --rm migration npx prisma migrate deploy

            # Recreate containers with new code
            docker compose -f deploy/docker-compose.prod.yml --env-file .env --env-file .env.secrets up -d --force-recreate

            # Clean up old dangling images
            docker image prune -f

            # Wait for health check
            HEALTHY=false
            for i in $(seq 1 30); do
              if wget -qO- http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "Health check passed!"
                HEALTHY=true
                break
              fi
              echo "Waiting for app to start... ($i/30)"
              sleep 2
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "Health check FAILED! Printing container logs:"
              docker compose -f deploy/docker-compose.prod.yml --env-file .env --env-file .env.secrets logs app
              exit 1
            fi

            echo "Deployed successfully!"

