name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 138.201.119.11
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/lorescryver
            if [ ! -d .git ]; then
              git clone https://github.com/kodigero/lorescryver.git .
            else
              git pull origin main
            fi
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # Inject secrets into .env
            grep -q '^DEEPSEEK_API_KEY=' .env && sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}|" .env || echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env

            docker compose -f deploy/docker-compose.prod.yml build
            docker compose -f deploy/docker-compose.prod.yml up -d
            docker compose -f deploy/docker-compose.prod.yml exec -T app npx prisma migrate deploy || true
            echo "Deployed successfully!"
