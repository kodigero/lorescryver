version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 768m
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - internal

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lorescryver
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: lorescryver
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lorescryver']
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 768m
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - internal

  db_backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgbackups:/backups
    command: >
      sh -c 'while true; do
        pg_dump -h db -U lorescryver -d lorescryver -Fc -f /backups/lorescryver-$$(date +%Y%m%d-%H%M%S).dump;
        find /backups -type f -name "*.dump" -mtime +14 -delete;
        sleep 86400;
      done'
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - internal

volumes:
  pgdata:
  pgbackups:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
